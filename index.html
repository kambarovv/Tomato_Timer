<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus OS</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="boxes">
        <div class="box head_box">
          <header>
            <h2>🍅 Tomato Timer</h2>
            <h4>Focus on your habits</h4>
            <div class="head_day" id="currentDay"></div>
          </header>
        </div>

        <div class="box">
          <div class="task">
            <input id="taskInput" placeholder="What are you working on?" />
          </div>

          <div class="circle">
            <svg width="200" height="200">
              <circle class="bg" cx="100" cy="100" r="90" />
              <circle class="progress" id="progress" cx="100" cy="100" r="90" />
            </svg>
            <div class="time" id="time">25:00</div>
          </div>

          <div class="custom">
            <input id="minutes" type="number" value="25" min="1" />
            <span>min</span>
          </div>

          <div class="controls">
            <button onclick="start()">Start</button>
            <button onclick="pause()">Pause</button>
            <button onclick="reset()">Reset</button>
          </div>

          <div class="sessions">🔥 Sessions: <span id="sessions">0</span></div>
        </div>
      </div>
    </div>

    <footer>
      <a href="https://github.com/kambarovv" target="_blank">
        Created by Marco
      </a>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
